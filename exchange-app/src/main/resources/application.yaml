spring:
  application:
    name: exchange-lab
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        group: ${NACOS_DISCOVERY_GROUP:DEFAULT_GROUP}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: ${SENTINEL_TRANSPORT_PORT:8719}
      eager: true
  datasource:
    url: jdbc:postgresql://localhost:5432/exchange_lab
    username: exchange_lab
    password: exchange_lab
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  tracing:
    export:
      enabled: ${TRACING_EXPORT_ENABLED:false}
      zipkin:
        enabled: ${ZIPKIN_TRACING_EXPORT_ENABLED:false}
        endpoint: ${ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoints:
    web:
      exposure:
        include: health,info,mappings,prometheus
