server:
  port: 9000

spring:
  application:
    name: exchange-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        group: ${NACOS_DISCOVERY_GROUP:DEFAULT_GROUP}
    gateway:
      server:
        webflux:
          routes:
            - id: exchange-app-api
              uri: lb://exchange-lab
              predicates:
                - Path=/api/**

management:
  tracing:
    export:
      enabled: ${TRACING_EXPORT_ENABLED:false}
      zipkin:
        enabled: ${ZIPKIN_TRACING_EXPORT_ENABLED:false}
        endpoint: ${ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
