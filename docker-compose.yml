services:
  nacos:
    image: nacos/nacos-server:v3.2.2
    container_name: exchange-lab-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "ZXhjaGFuZ2UtbGFiLWRldi1vbmx5LW5hY29zLWF1dGgtdG9rZW4tYXQtbGVhc3QtMzItYnl0ZXM="
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "exchange-lab"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "18080:8080"

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:latest
    container_name: exchange-lab-sentinel-dashboard
    ports:
      - "8858:8858"

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: exchange-lab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:13.1.0
    container_name: exchange-lab-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  skywalking-banyandb:
    image: apache/skywalking-banyandb:0.10.2
    container_name: exchange-lab-skywalking-banyandb
    command: standalone
    ports:
      - "17912:17912"
      - "17913:17913"
    volumes:
      - skywalking_banyandb_data:/tmp

  skywalking-oap:
    image: apache/skywalking-oap-server:10.4.0-java21
    container_name: exchange-lab-skywalking-oap
    environment:
      SW_STORAGE: banyandb
      SW_STORAGE_BANYANDB_TARGETS: skywalking-banyandb:17912
      SW_RECEIVER_ZIPKIN: default
      SW_QUERY_ZIPKIN: default
      SW_HEALTH_CHECKER: default
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "11800:11800"
      - "12800:12800"
      - "9411:9411"
      - "9412:9412"
    depends_on:
      - skywalking-banyandb

  skywalking-ui:
    image: apache/skywalking-ui:10.4.0-java21
    container_name: exchange-lab-skywalking-ui
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
      JAVA_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "18086:8080"
    depends_on:
      - skywalking-oap

  postgres:
    image: postgres:18
    container_name: exchange-lab-postgres
    environment:
      POSTGRES_DB: exchange_lab
      POSTGRES_USER: exchange_lab
      POSTGRES_PASSWORD: exchange_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange_lab -d exchange_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  grafana_data:
  skywalking_banyandb_data:
